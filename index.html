<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מסלול טיול אינטראקטיבי - טנזניה</title>

    <!-- טעינת ה-CSS של Leaflet מהרשת -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
        }

        #map {
            flex: 1;
            height: 100%;
        }

        #info-panel {
            width: 350px;
            background-color: #f8f9fa;
            border-right: 2px solid #dee2e6;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            box-shadow: -2px 0 5px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #2c3e50;
            margin-top: 0;
        }

        .meta-info {
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 15px;
        }

        .desc {
            line-height: 1.6;
            color: #34495e;
        }

        .placeholder {
            color: #bdc3c7;
            font-style: italic;
            text-align: center;
            margin-top: 50%;
        }
    </style>
</head>

<body>

    <!-- פאנל המידע הצדדי -->
    <div id="info-panel">
        <div id="panel-content">
            <p class="placeholder">לחץ על אתר או מסלול במפה כדי להציג את פרטי הטיול והמרחק</p>
        </div>
    </div>

    <!-- רכיב המפה -->
    <div id="map"></div>

    <!-- טעינת ה-JavaScript של Leaflet מהרשת -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="app.js"></script>
</body>
</body>

</html>
