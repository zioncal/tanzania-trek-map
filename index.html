<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מסלול טיול אינטראקטיבי - טנזניה</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: #f4f6f7;
        }
        
        /* ברירת מחדל למחשבים (Desktop) - פאנל מימין ומפה משמאל */
        #map {
            flex: 1;
            height: 100%;
            z-index: 1;
        }
        #info-panel {
            width: 390px;
            background-color: #f8f9fa;
            border-left: 2px solid #dee2e6;
            padding: 22px;
            box-sizing: border-box;
            overflow-y: auto;
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
            z-index: 2;
        }
        
        h2 { color: #2c3e50; margin-top: 0; font-size: 19px; border-bottom: 2px solid #3498db; padding-bottom: 8px; margin-bottom: 12px; }
        .meta-info { font-size: 14px; color: #555; margin-bottom: 6px; font-weight: normal; }
        .desc { line-height: 1.6; color: #34495e; font-size: 13.5px; }
        .placeholder { color: #95a5a6; font-style: italic; text-align: center; margin-top: 50%; font-size: 14px; }

        /* ======================================================= */
        /* התאמה למכשירים ניידים וסמארטפונים (Mobile Responsive) */
        /* ======================================================= */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            #map {
                width: 100%;
                height: 100vh;
                position: absolute;
                top: 0;
                left: 0;
            }
            #info-panel {
                width: 92%;
                max-height: 32vh; /* הגבלת הגובה כדי שהמפה תישאר פתוחה לרווחה */
                position: absolute;
                bottom: 12px;
                left: 4%;
                right: 4%;
                border-left: none;
                border-radius: 14px;
                box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
                padding: 16px;
                background-color: rgba(255, 255, 255, 0.96);
                backdrop-filter: blur(6px);
                z-index: 1000;
                overflow-y: auto;
            }
            .placeholder {
                margin-top: 5px;
                font-size: 13px;
            }
            h2 { font-size: 16px; margin-bottom: 6px; padding-bottom: 4px; }
            .meta-info { font-size: 12.5px; margin-bottom: 4px; }
            .desc { font-size: 13px; line-height: 1.5; }
        }
    </style>
</head>
<body>

    <div id="info-panel">
        <div id="panel-content">
            <p class="placeholder">🗺️ לחץ על יום או נתיב במפה להצגת פרטי הטרק והמרחקים</p>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
